base_model: Qwen/Qwen3-4B            # HF hub id or a local model path
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
load_in_8bit: false
load_in_4bit: false
datasets:
  - path: tatsu-lab/alpaca
    type: alpaca
dataset_prepared_path: ./prepared/qwen4b_fft_s2048   # local cache dir
val_set_size: 0.0
output_dir: ./out/qwen4b_fft_s2048/adamw
sequence_len: 2048
sample_packing: false
pad_to_sequence_len: true
micro_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 5e-5
lr_scheduler: constant
warmup_steps: 5
optimizer: adamw_torch_fused
bf16: true
flash_attention: true
gradient_checkpointing: false
seed: 42
data_seed: 42
logging_steps: 1
max_steps: 40
save_strategy: "no"
special_tokens:

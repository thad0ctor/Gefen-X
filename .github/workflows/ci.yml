name: CI

# CPU job runs automatically on every push / PR. The GPU test job is opt-in
# (manual workflow_dispatch) because the kernel parity tests require a CUDA
# device + nvcc, which GitHub-hosted runners do not provide. Trigger it from
# the Actions tab if you have a self-hosted GPU runner labelled [self-hosted, gpu].

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_gpu_tests:
        description: "Run CUDA kernel parity tests on a self-hosted GPU runner"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for every job: none of them write to the repo, so a
# read-only token limits the blast radius if an install/test dependency is
# compromised. A job can widen this locally if it ever needs to.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: ruff check
        # Config lives in pyproject.toml ([tool.ruff]); scoped to pyflakes (F)
        # so it catches real bugs without reformatting the tree.
        run: ruff check .

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist + wheel
        # Pure-Python build (kernels JIT at runtime), so no CUDA toolchain needed.
        run: python -m build

      - name: twine check
        run: python -m twine check dist/*

  cpu:
    name: CPU tests (py${{ matrix.python-version }}, ${{ matrix.torch-label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            torch-spec: "torch==2.5.0"
            torch-label: "torch floor 2.5.0"
          - python-version: "3.11"
            torch-spec: "torch"
            torch-label: "latest torch"
          - python-version: "3.12"
            torch-spec: "torch"
            torch-label: "latest torch"
          - python-version: "3.13"
            torch-spec: "torch"
            torch-label: "latest torch"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU PyTorch + package
        env:
          TORCH_SPEC: ${{ matrix.torch-spec }}
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel: the CUDA wheel is ~2GB and pointless here.
          pip install "$TORCH_SPEC" --index-url https://download.pytorch.org/whl/cpu
          # torch is already satisfied, so this only pulls numba/numpy/ninja + gefen.
          pip install '.[test]'

      - name: Byte-compile all sources
        run: python -m compileall -q src/gefen

      - name: Import smoke (no CUDA required)
        # The src layout keeps the checkout root from shadowing the installed package.
        run: |
          python - <<'PY'
          import gefen
          # Resolve every public export in __all__ so this adapts per branch and
          # exercises the lazy __getattr__ hooks. Exports are a mix of classes,
          # a submodule ("kernels"), the version string, and integer schema
          # constants (e.g. CONTRACT_SCHEMA_VERSION), so report __name__ where it
          # exists and fall back to repr for value exports.
          loaded = {n: getattr(getattr(gefen, n), "__name__", repr(getattr(gefen, n))) for n in gefen.__all__}
          assert "Gefen" in loaded, "Gefen must always be importable"
          print("import OK ->", loaded)
          PY

      - name: CPU test suite
        # CUDA-dependent tests skip themselves; the CPU-runnable ones
        # (validation, CPU step paths, checkpoint round-trip,
        # partitioning/quantization, LR tools) run from the checkout root.
        run: python -m pytest tests -q -ra

  gpu-tests:
    name: GPU kernel parity tests
    # Runs on every PR targeting main so the CUDA-only fail-before-mutation /
    # kernel-parity tests actually gate merges, plus on-demand via the Actions tab.
    # (Pushes to other branches and non-main PRs still skip it.)
    if: >-
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_gpu_tests)
    runs-on: [self-hosted, gpu]
    # Tradeoff: the self-hosted GPU runner must be online for PRs to main. If it
    # is offline the job is not picked up and, after this timeout, fails fast so
    # the PR shows a failed GPU check (a visible, honest signal) instead of either
    # sitting pending forever or silently skipping GPU coverage.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install package (CUDA torch expected on the runner)
        run: |
          python -m pip install --upgrade pip
          pip install '.[test]'

      - name: Run full test suite (CUDA)
        # Multi-GPU / FSDP2 cases skip themselves when the runner has one GPU.
        run: python -m pytest tests -q -ra
